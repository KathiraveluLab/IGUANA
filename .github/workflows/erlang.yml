name: Erlang CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:

  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Erlang
      uses: erlef/setup-beam@v1
      with:
        otp-version: '26.2'
        rebar3-version: 'latest'

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install torch transformers erlport
        
    - name: Set up Erlang build environment
      run: |
        sudo apt-get update && sudo apt-get install -y build-essential
        
    - name: Fetch Dependencies
      run: rebar3 get-deps
      
    - name: Build IGUANA (including SIMD NIF)
      run: rebar3 compile
      
    - name: Run Static Analysis (Lint & Dialyzer)
      run: |
        rebar3 lint
        rebar3 dialyzer
        
    - name: Run Validation Suite (EUnit & Common Test)
      run: |
        rebar3 eunit
        rebar3 ct
        
    - name: Run Performance Benchmark
      run: rebar3 shell --eval "benchmark:run(), init:stop()."
      
    - name: Upload Test Logs & Artifacts
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: iguana-validation-results
        path: |
          _build/test/logs/
          benchmark_results.txt
