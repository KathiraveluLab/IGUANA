name: Erlang CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:

  build:

    runs-on: ubuntu-latest

    container:
      image: erlang:26.2

    steps:
    - uses: actions/checkout@v4
    - name: Install rebar3
      run: curl -fsSL https://s3.amazonaws.com/rebar3/rebar3 -o /usr/local/bin/rebar3 && chmod +x /usr/local/bin/rebar3
    - name: Fetch Dependencies
      run: rebar3 get-deps
    - name: Compile all Erlang Sources
      run: rebar3 compile
    - name: Run Native Benchmark Suite
      run: |
        cd src/eval
        erlc benchmark.erl
        erl -noshell -s benchmark run -s init stop
